# CFM LEAP-1A / 1B — common on A320neo / B737 MAX
# Newer architecture: longer intervals, shorter shop visits, lower risk multipliers.
name: LEAP
max_cycles_between_shop: 25000
rul_trigger: 0.08         # more durable — can run closer to limit
cycle_trigger: 22000
default_shop_visit_duration: 2
maintenance_base_cost: 450000
maintenance_cost_per_cycle: 70
delay_risk_multiplier:
  high: 1.8
  medium: 1.3
  low: 1.05
score_threshold_high: 8
score_threshold_medium: 4
